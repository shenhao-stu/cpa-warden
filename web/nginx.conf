server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: reverse-proxy to CPA backend to avoid CORS issues.
    # Set the CPA_BACKEND environment variable or replace the upstream below.
    # location /api/ {
    #     proxy_pass http://cpa-backend:8317/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
